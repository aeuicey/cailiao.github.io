    t += 1;
    globalPulse = 0.5 + 0.5*Math.sin(t*0.008);

    ctx.clearRect(0,0,W,H);

    /* draw particles */
    for(var i=0;i<particles.length;i++){
      particles[i].update();
      particles[i].draw();
    }

    /* draw wires */
    for(var wi=0; wi<wires.length; wi++){
      var w = wires[wi];
      w.phase += w.speed1;

      var cy = H * w.baseY;

      /* moving highlight position (sweeps across the screen) */
      var highlightX = (Math.sin(t*0.003 + wi*1.1)*0.5+0.5) * W;
      var highlightWidth = W * 0.35;

      /* --- glow pass --- */
      if(w.glow > 0){
        ctx.beginPath();
        ctx.moveTo(0, H);
        for(var x=0; x<=W; x+=4){
          var y = cy
                + Math.sin(x*w.freq1 + w.phase)*w.amp1
                + Math.sin(x*w.freq2 + w.phase*1.3)*w.amp2
                + Math.cos(x*w.freq1*0.4 + w.phase*0.6)*w.amp1*0.15;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H);
        ctx.closePath();
        var gg = ctx.createLinearGradient(0, cy-w.amp1*1.5, 0, cy+w.amp1*2.5);
        gg.addColorStop(0, 'rgba(170,180,210,'+(w.alpha*0.6)+')');
        gg.addColorStop(0.4, 'rgba(150,160,190,'+(w.alpha*0.25)+')');
        gg.addColorStop(1, 'rgba(130,140,170,0)');
        ctx.fillStyle = gg;
        ctx.fill();
      }

      /* --- crest line with metallic highlight --- */
      ctx.lineWidth = w.lw;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      /* draw in segments for per-segment metallic brightness */
      var step = 3;
      for(var x=0; x<W; x+=step){
        var x2 = Math.min(x+step, W);
        var y1 = cy
              + Math.sin(x*w.freq1 + w.phase)*w.amp1
              + Math.sin(x*w.freq2 + w.phase*1.3)*w.amp2
              + Math.cos(x*w.freq1*0.4 + w.phase*0.6)*w.amp1*0.15;
        var y2 = cy
              + Math.sin(x2*w.freq1 + w.phase)*w.amp1
              + Math.sin(x2*w.freq2 + w.phase*1.3)*w.amp2
              + Math.cos(x2*w.freq1*0.4 + w.phase*0.6)*w.amp1*0.15;

        /* metallic highlight: brightness peaks near highlightX */
        var distFromHighlight = Math.abs((x+x2)*0.5 - highlightX);
        var highlightFactor = Math.max(0, 1 - distFromHighlight/highlightWidth);
        highlightFactor = highlightFactor*highlightFactor; /* ease-in */

        var baseBright = w.bright;
        var segBright = baseBright + highlightFactor*(1-baseBright)*0.8;
        var segAlpha = w.alpha * (0.6 + 0.4*segBright);

        /* silver colour: R~192 G~200 B~215 base, pushed brighter near highlight */
        var r = Math.round(lerp(140, 235, segBright));
        var g = Math.round(lerp(148, 240, segBright));
        var b = Math.round(lerp(170, 252, segBright));

        ctx.beginPath();
        ctx.moveTo(x, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = 'rgba('+r+','+g+','+b+','+segAlpha+')';

        if(w.glow > 0 && highlightFactor > 0.1){
          ctx.shadowColor = 'rgba(200,210,230,'+(highlightFactor*0.35)+')';
          ctx.shadowBlur = w.glow * highlightFactor;
        } else {
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;
        }
        ctx.stroke();
      }
      /* reset shadow */
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    }

    /* --- subtle geometric accents (Arknights corner lines) --- */
    var cornerAlpha = 0.03 + 0.015*Math.sin(t*0.005);
    ctx.strokeStyle = 'rgba(180,190,215,'+cornerAlpha+')';
    ctx.lineWidth = 0.5;
    /* top-right */
    ctx.beginPath();
    ctx.moveTo(W-60, 20); ctx.lineTo(W-20, 20); ctx.lineTo(W-20, 60);
    ctx.stroke();
    /* bottom-left */
    ctx.beginPath();
    ctx.moveTo(20, H-60); ctx.lineTo(20, H-20); ctx.lineTo(60, H-20);
    ctx.stroke();

    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
<script>
/* Theme Toggle Button Logic */
(function(){
  var KEY='theme-preference';
  var html=document.documentElement;
  var stored=localStorage.getItem(KEY);
  var sysDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var isDark=stored?stored==='dark':sysDark;
  var btn=document.createElement('button');
  btn.className='theme-toggle'+(isDark?' dark':'');
  btn.id='themeToggle';
  btn.setAttribute('aria-label','切换主题');
  btn.innerHTML='<svg class="theme-toggle-sun" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v1.5M12 19.5V21M3 12h1.5M19.5 12H21M5.6 5.6l1 1M17.4 17.4l1 1M5.6 18.4l1-1M17.4 6.6l1-1"/></svg><div class="theme-toggle-knob"></div><svg class="theme-toggle-moon" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4 6.5 6.5 0 0 0 20 14.5z"/></svg>';
  document.body.appendChild(btn);
  function applyTheme(dark){
    var darkStyle=document.getElementById('style-dark-theme');
    html.setAttribute('data-theme',dark?'dark':'light');
    if(dark){btn.classList.add('dark');if(darkStyle)darkStyle.disabled=false}
    else{btn.classList.remove('dark');if(darkStyle)darkStyle.disabled=true}
  }
  btn.addEventListener('click',function(){
    var newDark=!btn.classList.contains('dark');
    localStorage.setItem(KEY,newDark?'dark':'light');
    applyTheme(newDark);
  });
  window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){
    if(!localStorage.getItem(KEY))applyTheme(e.matches);
  });
})();
</script>
